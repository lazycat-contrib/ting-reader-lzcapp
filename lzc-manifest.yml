name: Ting Reader
package: community.lazycat.app.ting-reader
version: 1.0.2
min_os_version: 1.3.8
description: "A modern web-based e-book reader application"
license: MIT
homepage: https://github.com/dqsq2e2/ting-reader
author: dqsq2e2

application:
  subdomain: ting-reader
  public_path:
    - /
  upstreams:
    - location: /
      backend: http://ting-reader:3000/

services:
  ting-reader:
    # dqsq2e2/ting-reader:1.0.2
    image: registry.lazycat.cloud/czyt/dqsq2e2/ting-reader:be55e7437abf2822
    environment:
      - JWT_SECRET={{ stable_secret "ting$reader"}}
      - PORT=3000
      - DB_PATH=/app/data/ting-reader.db
    binds:
      - /lzcapp/var/data:/app/data
      - /lzcapp/var/storage:/app/storage
      - /lzcapp/cache/cache:/app/cache
    restart: always
    cpu_shares: 512
    mem_limit: 512M

locales:
  en:
    name: "Ting Reader"
    description: "A  lightweight, self-hosted audiobook platform that supports automatic metadata scraping, multi-device playback progress synchronization "
  zh:
    name: "Ting Reader"
    description: "一个轻量级的自托管有声书平台，支持自动刮削元数据、多端播放进度同步"
